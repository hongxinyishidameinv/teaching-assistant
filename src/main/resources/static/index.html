<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘉庚学院 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            background: transparent;
        }

        .mouse-particle {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.9) 0%, rgba(139, 92, 246, 0.5) 50%, rgba(139, 92, 246, 0.2) 70%, transparent 100%);
            transform: translate(-50%, -50%);
            z-index: 9999;
            animation: mouse-fade 0.8s ease-out forwards;
        }

        @keyframes mouse-fade {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0);
            }
        }

        /* 网点纹理背景 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(139, 92, 246, 0.15) 1.5px, transparent 1.5px);
            background-size: 20px 20px;
            pointer-events: none;
            z-index: 0;
        }

        /* 霓虹发光边框卡片 */
        .card-wrapper {
            position: relative;
            width: 100%;
            max-width: 620px;
            padding: 0;
            z-index: 10;
        }

        /* 最外层光晕 - 大范围柔和发光 */
        .card-wrapper::before {
            content: '';
            position: absolute;
            inset: -28px;
            background: 
                radial-gradient(ellipse 85% 85% at top left, rgba(139, 92, 246, 0.75) 0%, rgba(167, 139, 250, 0.6) 25%, rgba(192, 132, 252, 0.4) 45%, rgba(167, 139, 250, 0.25) 60%, rgba(139, 92, 246, 0.1) 75%, transparent 90%),
                radial-gradient(ellipse 85% 85% at bottom right, rgba(245, 158, 11, 0.75) 0%, rgba(251, 191, 36, 0.6) 25%, rgba(252, 211, 77, 0.4) 45%, rgba(251, 191, 36, 0.25) 60%, rgba(245, 158, 11, 0.1) 75%, transparent 90%);
            border-radius: 56px;
            z-index: 1;
            filter: blur(36px);
            opacity: 0.9;
        }

        /* 角落发光层 - 高光和紫金融合 */
        .card-wrapper::after {
            content: '';
            position: absolute;
            inset: -8px;
            background: 
                radial-gradient(ellipse 75% 75% at top left, rgba(139, 92, 246, 0.8) 0%, rgba(167, 139, 250, 0.65) 20%, rgba(192, 132, 252, 0.5) 40%, rgba(167, 139, 250, 0.3) 60%, rgba(139, 92, 246, 0.15) 75%, transparent 90%),
                radial-gradient(ellipse 75% 75% at bottom right, rgba(245, 158, 11, 0.8) 0%, rgba(251, 191, 36, 0.65) 20%, rgba(252, 211, 77, 0.5) 40%, rgba(251, 191, 36, 0.3) 60%, rgba(245, 158, 11, 0.15) 75%, transparent 90%),
                radial-gradient(ellipse 70% 70% at top left, rgba(255, 255, 255, 0.7) 0%, rgba(255, 255, 255, 0.55) 20%, rgba(255, 255, 255, 0.35) 40%, rgba(232, 212, 255, 0.2) 60%, rgba(200, 180, 255, 0.1) 75%, transparent 90%),
                radial-gradient(ellipse 70% 70% at bottom right, rgba(255, 255, 255, 0.7) 0%, rgba(255, 255, 255, 0.55) 20%, rgba(255, 255, 255, 0.35) 40%, rgba(255, 240, 200, 0.2) 60%, rgba(255, 220, 150, 0.1) 75%, transparent 90%);
            border-radius: 36px;
            z-index: 2;
            filter: blur(4px);
            opacity: 0.85;
        }

        .glow-card {
            position: relative;
            background: #000;
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px;
            z-index: 10;
            border: none;
            box-shadow: 
                0 0 40px rgba(139, 92, 246, 0.5),
                0 0 40px rgba(245, 158, 11, 0.4),
                0 8px 32px rgba(0, 0, 0, 0.5);
        }

        /* Logo区域 */
        .logo-section {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 8px 32px rgba(139, 92, 246, 0.5);
            transition: transform 0.3s ease;
            overflow: hidden;
            padding: 0;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .logo svg {
            width: 40px;
            height: 40px;
            color: white;
        }

        .logo-section h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .logo-section p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        /* 消息提示 */
        .message {
            padding: 12px 16px;
            border-radius: 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }

        .message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .message.error {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(236, 72, 153, 0.2));
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .message.success {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(16, 185, 129, 0.2));
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        .message svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* 表单 */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper svg {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: rgba(255, 255, 255, 0.4);
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-group input:focus {
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.15);
        }

        /* 按钮 */
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            border: none;
            border-radius: 24px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 
                0 4px 24px rgba(139, 92, 246, 0.5),
                0 2px 8px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transform: translateY(0);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 6px 32px rgba(139, 92, 246, 0.6),
                0 4px 12px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }

        .btn:hover svg {
            transform: translateX(4px);
        }

        /* 链接区域 */
        .link-section {
            text-align: center;
            margin-top: 28px;
        }

        .link-section p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        .link-section a {
            color: #a78bfa;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .link-section a:hover {
            color: #c4b5fd;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    <div class="card-wrapper">
        <div class="glow-card">
            <!-- Logo/标题区域 -->
            <div class="logo-section">
                <div class="logo">
                    <img src="/img/logo.png" alt="嘉庚学院Logo">
                </div>
                <h1>欢迎登录</h1>
                <p>进入厦门大学嘉庚学院</p>
            </div>

            <!-- 错误消息 -->
            <div id="errorMessage" class="message error">
                <svg fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
                </svg>
                <span></span>
            </div>
            
            <!-- 成功消息 -->
            <div id="successMessage" class="message success">
                <svg fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
                </svg>
                <span></span>
            </div>

            <!-- 登录表单 -->
            <form id="loginForm">
                <!-- 用户名输入框 -->
                <div class="form-group">
                    <label for="username">用户名</label>
                    <div class="input-wrapper">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                        <input type="text" id="username" name="username" placeholder="请输入用户名" required value="">
                    </div>
                </div>

                <!-- 密码输入框 -->
                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="input-wrapper">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                        <input type="password" id="password" name="password" placeholder="请输入密码" required>
                    </div>
                </div>

                <!-- 登录按钮 -->
                <button type="submit" class="btn">
                    登 录
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                    </svg>
                </button>
            </form>

            <!-- 注册链接 -->
            <div class="link-section">
                <p>还没有账号？<a href="/page/register.html">立即注册</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/axios/1.6.2/axios.min.js"></script>
    <script>
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouseX = 0;
        let mouseY = 0;
        let animationId;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 2;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.6 + 0.4;
                this.hue = Math.random() > 0.5 ? 263 : 45;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < 150) {
                    const force = (150 - distance) / 150;
                    const angle = Math.atan2(dy, dx);
                    this.x -= Math.cos(angle) * force * 2;
                    this.y -= Math.sin(angle) * force * 2;
                    this.opacity = Math.min(1, this.opacity + force * 0.3);
                } else {
                    this.opacity = Math.max(0.4, this.opacity - 0.005);
                }

                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 90%, 80%, ${this.opacity})`;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 90%, 80%, ${this.opacity * 0.2})`;
                ctx.fill();
            }
        }

        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 150) {
                        const opacity = (1 - distance / 150) * 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(167, 139, 250, ${opacity})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }
        }

        function initParticles() {
            particles = [];
            const particleCount = Math.min(150, Math.floor((canvas.width * canvas.height) / 10000));
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawConnections();

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            animationId = requestAnimationFrame(animate);
        }

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            const particle = document.createElement('div');
            particle.className = 'mouse-particle';
            particle.style.left = e.clientX + 'px';
            particle.style.top = e.clientY + 'px';
            const size = Math.random() * 6 + 4;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            document.body.appendChild(particle);

            setTimeout(() => {
                particle.remove();
            }, 800);
        });

        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });

        resizeCanvas();
        initParticles();
        animate();

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await axios.post('/api/auth/login', {
                    username: username,
                    password: password
                });

                const result = response.data;
                
                if (result.success) {
                    localStorage.setItem('token', result.data.token);
                    localStorage.setItem('currentUser', JSON.stringify(result.data));
                    window.location.href = '/page/home.html';
                } else {
                    document.getElementById('successMessage').classList.remove('show');
                    document.getElementById('errorMessage').querySelector('span').textContent = result.message;
                    document.getElementById('errorMessage').classList.add('show');
                }
            } catch (error) {
                console.error('登录失败:', error);
                document.getElementById('successMessage').classList.remove('show');
                document.getElementById('errorMessage').querySelector('span').textContent = '登录失败，请检查网络连接';
                document.getElementById('errorMessage').classList.add('show');
            }
        });
    </script>
</body>
</html>
