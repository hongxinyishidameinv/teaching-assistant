<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI问答测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background: #45a049;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 4px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .error {
            color: red;
        }
        .success {
            color: green;
        }
    </style>
</head>
<body>
    <h1>AI问答功能测试</h1>
    
    <div class="test-section">
        <h2>测试1: 测试AI连接</h2>
        <button onclick="testConnection()">测试连接</button>
        <div id="test1-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>测试2: 简单问答</h2>
        <input type="text" id="message" value="你好" style="padding: 8px; width: 300px;">
        <button onclick="testChat()">发送</button>
        <div id="test2-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>测试3: 带上下文对话</h2>
        <button onclick="testChatWithHistory()">测试上下文对话</button>
        <div id="test3-result" class="result"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        axios.defaults.withCredentials = true;

        async function testConnection() {
            const resultDiv = document.getElementById('test1-result');
            resultDiv.textContent = '测试中...';
            
            try {
                const response = await axios.get('/api/teacher/ai/test');
                console.log('测试连接响应:', response.data);
                resultDiv.className = 'result success';
                resultDiv.textContent = '✅ 成功！\n' + JSON.stringify(response.data, null, 2);
            } catch (error) {
                console.error('测试连接错误:', error);
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ 失败！\n' + JSON.stringify({
                    message: error.message,
                    response: error.response?.data,
                    status: error.response?.status
                }, null, 2);
            }
        }

        async function testChat() {
            const resultDiv = document.getElementById('test2-result');
            const message = document.getElementById('message').value;
            resultDiv.textContent = '发送中...';
            
            try {
                const response = await axios.post('/api/teacher/ai/chat', {
                    message: message
                });
                console.log('简单问答响应:', response.data);
                resultDiv.className = 'result success';
                resultDiv.textContent = '✅ 成功！\n' + JSON.stringify(response.data, null, 2);
            } catch (error) {
                console.error('简单问答错误:', error);
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ 失败！\n' + JSON.stringify({
                    message: error.message,
                    response: error.response?.data,
                    status: error.response?.status
                }, null, 2);
            }
        }

        async function testChatWithHistory() {
            const resultDiv = document.getElementById('test3-result');
            resultDiv.textContent = '发送中...';
            
            const messages = [
                { role: 'user', content: '你好' },
                { role: 'assistant', content: '你好！有什么可以帮助你的？' },
                { role: 'user', content: '如何提高教学质量？' }
            ];
            
            try {
                const response = await axios.post('/api/teacher/ai/chat-with-history', {
                    messages: JSON.stringify(messages)
                });
                console.log('上下文对话响应:', response.data);
                resultDiv.className = 'result success';
                resultDiv.textContent = '✅ 成功！\n' + JSON.stringify(response.data, null, 2);
            } catch (error) {
                console.error('上下文对话错误:', error);
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ 失败！\n' + JSON.stringify({
                    message: error.message,
                    response: error.response?.data,
                    status: error.response?.status
                }, null, 2);
            }
        }
    </script>
</body>
</html>
