<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘉庚学院 - 注册</title>
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-gradient-to-br from-cyan-400 via-blue-500 to-indigo-600 bg-[length:400%_400%] animate-gradient flex items-center justify-center p-4 relative overflow-hidden font-sans">
    <!-- 背景装饰 -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-10 left-10 w-32 h-32 bg-cyan-300/20 rounded-full blur-xl animate-float"></div>
        <div class="absolute bottom-20 right-20 w-48 h-48 bg-blue-400/20 rounded-full blur-xl animate-float-delayed"></div>
        <div class="absolute top-1/2 left-1/4 w-24 h-24 bg-indigo-400/20 rounded-full blur-xl animate-float"></div>
    </div>

    <!-- 注册卡片 -->
    <div class="bg-white/95 backdrop-blur-xl rounded-3xl shadow-2xl p-8 md:p-10 w-full max-w-md relative z-10 border border-white/20 my-8">
        <!-- Logo/标题区域 -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-2xl shadow-lg mb-4 transform hover:scale-110 transition-transform duration-300">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3a2 2 0 01-2 2h-3m5-5h-3m3 0a2 2 0 00-2-2H9a2 2 0 00-2 2v3"></path>
                </svg>
            </div>
            <h1 class="text-4xl font-bold bg-gradient-to-r from-cyan-600 to-blue-600 bg-clip-text text-transparent mb-2">
                用户注册
            </h1>
            <p class="text-gray-600 text-sm">创建您的账号</p>
        </div>

        <!-- 错误消息 -->
        <div id="errorMessage" class="hidden mb-6 p-4 bg-gradient-to-r from-red-500 to-pink-500 text-white rounded-xl shadow-lg animate-shake">
            <div class="flex items-center gap-2">
                <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
                </svg>
                <span class="text-sm font-medium"></span>
            </div>
        </div>

        <!-- 成功消息 -->
        <div id="successMessage" class="hidden mb-6 p-4 bg-gradient-to-r from-green-500 to-emerald-500 text-white rounded-xl shadow-lg">
            <div class="flex items-center gap-2">
                <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
                </svg>
                <span class="text-sm font-medium"></span>
            </div>
        </div>

        <!-- 注册表单 -->
        <form id="registerForm" class="space-y-5">
            <!-- 用户名输入框 -->
            <div class="space-y-2">
                <label for="username" class="block text-sm font-semibold text-gray-700">
                    用户名
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </div>
                    <input type="text" 
                           id="username" 
                           name="username" 
                           placeholder="请输入用户名" 
                           required
                           value=""
                           class="w-full pl-12 pr-4 py-3.5 border-2 border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:border-cyan-500 focus:outline-none focus:ring-4 focus:ring-cyan-100 transition-all duration-300 hover:border-gray-300">
                </div>
            </div>

            <!-- 邮箱输入框 -->
            <div class="space-y-2">
                <label for="email" class="block text-sm font-semibold text-gray-700">
                    邮箱
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                        </svg>
                    </div>
                    <input type="email" 
                           id="email" 
                           name="email" 
                           placeholder="请输入邮箱地址" 
                           required
                           value=""
                           class="w-full pl-12 pr-4 py-3.5 border-2 border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:border-cyan-500 focus:outline-none focus:ring-4 focus:ring-cyan-100 transition-all duration-300 hover:border-gray-300">
                </div>
            </div>

            <!-- 密码输入框 -->
            <div class="space-y-2">
                <label for="password" class="block text-sm font-semibold text-gray-700">
                    密码
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                    </div>
                    <input type="password" 
                           id="password" 
                           name="password" 
                           placeholder="请输入密码（至少6位）" 
                           required
                           minlength="6"
                           class="w-full pl-12 pr-4 py-3.5 border-2 border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:border-cyan-500 focus:outline-none focus:ring-4 focus:ring-cyan-100 transition-all duration-300 hover:border-gray-300">
                </div>
                <p class="text-xs text-gray-500 mt-1">密码长度不能少于6位</p>
            </div>

            <!-- 确认密码输入框 -->
            <div class="space-y-2">
                <label for="confirmPassword" class="block text-sm font-semibold text-gray-700">
                    确认密码
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                    <input type="password" 
                           id="confirmPassword" 
                           name="confirmPassword" 
                           placeholder="请再次输入密码" 
                           required
                           minlength="6"
                           class="w-full pl-12 pr-4 py-3.5 border-2 border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:border-cyan-500 focus:outline-none focus:ring-4 focus:ring-cyan-100 transition-all duration-300 hover:border-gray-300">
                </div>
            </div>

            <!-- 注册按钮 -->
            <button type="submit" 
                    class="group w-full bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg hover:shadow-2xl transform hover:-translate-y-0.5 active:translate-y-0 transition-all duration-300 focus:outline-none focus:ring-4 focus:ring-cyan-300 mt-6">
                <span class="flex items-center justify-center gap-2">
                    注 册
                    <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                    </svg>
                </span>
            </button>
        </form>

        <!-- 登录链接 -->
        <div class="mt-8 text-center">
            <p class="text-gray-600 text-sm">
                已有账号？
                <a href="/index.html" class="font-semibold text-cyan-600 hover:text-blue-600 transition-colors duration-300 hover:underline">
                    立即登录
                </a>
            </p>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/axios/1.6.2/axios.min.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                document.getElementById('successMessage').classList.add('hidden');
                document.getElementById('errorMessage').querySelector('span').textContent = '两次输入的密码不一致！';
                document.getElementById('errorMessage').classList.remove('hidden');
                return;
            }

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;

            try {
                const userData = {
                    username: username,
                    password: password,
                    email: email,
                    type: 'student'
                };
                
                const response = await axios.post('/api/auth/register', userData);
                if (response.data.code === 200) {
                    document.getElementById('errorMessage').classList.add('hidden');
                    document.getElementById('successMessage').querySelector('span').textContent = '注册成功！即将跳转到登录页...';
                    document.getElementById('successMessage').classList.remove('hidden');
                    
                    // 3秒后跳转到登录页
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 3000);
                } else {
                    document.getElementById('successMessage').classList.add('hidden');
                    document.getElementById('errorMessage').querySelector('span').textContent = response.data.message || '注册失败';
                    document.getElementById('errorMessage').classList.remove('hidden');
                }
            } catch (error) {
                console.error('注册失败:', error);
                document.getElementById('successMessage').classList.add('hidden');
                document.getElementById('errorMessage').querySelector('span').textContent = '注册失败，请检查网络连接';
                document.getElementById('errorMessage').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
