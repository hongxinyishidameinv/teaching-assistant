<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 嘉庚学院管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* 顶部导航栏 */
        header {
            background: linear-gradient(135deg, #06b6d4, #3b82f6, #8b5cf6);
            padding: 16px 32px;
            box-shadow: 0 2px 10px rgba(6, 182, 212, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo svg {
            width: 22px;
            height: 22px;
            fill: white;
        }
        .system-title {
            font-size: 20px;
            font-weight: 600;
            color: white;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
        }
        .user-info svg {
            width: 24px;
            height: 24px;
        }
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        .btn-white {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .btn-white:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .btn-danger:hover {
            background: #dc2626;
        }

        /* 主体内容 */
        .main-content {
            display: flex;
            min-height: calc(100vh - 72px);
        }

        /* 侧边栏 */
        .sidebar {
            width: 240px;
            background: #1e293b;
            border-right: 1px solid #334155;
            padding: 24px 0;
        }
        .sidebar-menu {
            list-style: none;
            padding: 0 16px;
        }
        .sidebar-menu li {
            margin-bottom: 4px;
        }
        .sidebar-menu button {
            width: 100%;
            padding: 12px 16px;
            background: none;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-menu button:hover {
            background: #334155;
            color: #f1f5f9;
        }
        .sidebar-menu button.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        .sidebar-menu button svg {
            width: 18px;
            height: 18px;
        }
        .menu-title {
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 16px 0 8px;
        }

        /* 主内容区域 */
        .content {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            background: #0f172a;
        }
        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 8px;
        }
        .page-subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 32px;
        }

        /* 卡片样式 */
        .card {
            background: #1e293b;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            margin-bottom: 24px;
            border: 1px solid #334155;
        }
        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #f1f5f9;
        }
        .card-content {
            padding: 24px;
        }

        /* 用户信息卡片 */
        .profile-card {
            display: flex;
            gap: 24px;
            padding: 24px;
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .profile-avatar svg {
            width: 60px;
            height: 60px;
            fill: white;
        }
        .profile-details {
            flex: 1;
        }
        .profile-name {
            font-size: 24px;
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 4px;
        }
        .profile-role {
            display: inline-block;
            padding: 4px 12px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 16px;
        }
        .profile-stats {
            display: flex;
            gap: 24px;
        }
        .stat-item {
            text-align: center;
            padding: 16px 24px;
            background: #0f172a;
            border-radius: 12px;
            border: 1px solid #334155;
            min-width: 120px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #f8fafc;
            display: block;
        }
        .stat-label {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
            display: block;
        }

        /* 表单样式 */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #cbd5e1;
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #334155;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
            background: #0f172a;
            color: #f1f5f9;
        }
        .form-input:focus {
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
            border-color: #6366f1;
        }
        .form-input::placeholder {
            color: #64748b;
        }
        .btn-submit {
            padding: 12px 32px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 密码表单 */
        .password-form .form-group {
            max-width: 450px;
        }

        /* 输入组 */
        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group .form-input {
            flex: 1;
            padding-right: 45px;
        }

        .input-icon-btn {
            position: absolute;
            right: 8px;
            background: none;
            border: none;
            cursor: pointer;
            color: #64748b;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .input-icon-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
        }

        .input-icon-btn svg {
            width: 18px;
            height: 18px;
        }

        /* 密码强度指示器 */
        .password-strength {
            margin-top: 12px;
            padding: 12px;
            background-color: #0f172a;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .strength-label {
            font-size: 14px;
            font-weight: 500;
            color: #cbd5e1;
            margin-bottom: 8px;
        }

        .strength-bars {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }

        .strength-bars .bar {
            flex: 1;
            height: 8px;
            border-radius: 4px;
            background-color: #334155;
            transition: all 0.3s ease;
        }

        .strength-bars .bar.weak {
            background-color: #ef4444;
        }

        .strength-bars .bar.fair {
            background-color: #f59e0b;
        }

        .strength-bars .bar.good {
            background-color: #22c55e;
        }

        .strength-bars .bar.strong {
            background-color: #16a34a;
        }

        .strength-text {
            font-size: 13px;
            font-weight: 500;
        }

        .strength-text.weak {
            color: #ef4444;
        }

        .strength-text.fair {
            color: #f59e0b;
        }

        .strength-text.good {
            color: #22c55e;
        }

        .strength-text.strong {
            color: #16a34a;
        }

        /* 密码要求提示 */
        .password-requirements {
            margin-top: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .req-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #64748b;
        }

        .req-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            background-color: #334155;
            color: #64748b;
        }

        .req-item.fulfilled .req-icon {
            background-color: #22c55e;
            color: white;
        }

        .req-item.fulfilled {
            color: #4ade80;
        }

        /* 密码匹配指示器 */
        .match-indicator {
            margin-top: 8px;
            font-size: 13px;
            font-weight: 500;
        }

        .match-indicator.match {
            color: #22c55e;
        }

        .match-indicator.no-match {
            color: #ef4444;
        }

        .card-subtitle {
            font-size: 14px;
            color: #6b7280;
            margin-top: 4px;
            font-weight: normal;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .profile-card {
                flex-direction: column;
                text-align: center;
            }
            .profile-stats {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <header>
        <div class="header-left">
            <div class="logo">
                <svg viewBox="0 0 24 24">
                    <path d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </div>
            <span class="system-title">嘉庚学院管理系统</span>
        </div>
        <div class="header-right">
            <div class="user-info">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
                <span id="header-username">Admin</span>
            </div>
            <button onclick="goBack()" class="btn btn-white">返回首页</button>
            <button onclick="logout()" class="btn btn-danger">退出</button>
        </div>
    </header>

    <!-- 主体内容 -->
    <div class="main-content">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <ul class="sidebar-menu">
                <li><button id="menu-profile" class="active" onclick="showSection('profile')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    个人资料
                </button></li>
                <li><button id="menu-settings" onclick="showSection('settings')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    修改密码
                </button></li>
            </ul>
        </aside>

        <!-- 主内容区域 -->
        <main class="content">
            <h1 class="page-title">个人中心</h1>
            <p class="page-subtitle">管理您的个人资料和账户设置</p>

            <!-- 个人信息卡片 -->
            <div id="section-profile" class="card">
                <div class="card-header">
                    <h2 class="card-title">基本信息</h2>
                </div>
                <div class="card-content">
                    <div class="profile-card">
                        <div class="profile-avatar">
                            <svg viewBox="0 0 24 24">
                                <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                        </div>
                        <div class="profile-details">
                            <h3 id="profile-name" class="profile-name">Admin</h3>
                            <span id="profile-role-badge" class="profile-role">管理员</span>
                            <div class="profile-stats">
                                <div class="stat-item">
                                    <div class="stat-value">1</div>
                                    <div class="stat-label">账户类型</div>
                                </div>
                                <div class="stat-item">
                                    <div id="stat-course-count" class="stat-value">0</div>
                                    <div class="stat-label">课程数量</div>
                                </div>
                                <div class="stat-item">
                                    <div id="stat-student-count" class="stat-value">0</div>
                                    <div class="stat-label">学生数量</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 编辑表单 -->
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">用户名</label>
                            <input type="text" id="input-username" class="form-input" placeholder="请输入用户名">
                        </div>
                        <div class="form-group">
                            <label class="form-label">邮箱</label>
                            <input type="email" id="input-email" class="form-input" placeholder="请输入邮箱">
                        </div>
                        <div class="form-group">
                            <label class="form-label">用户类型</label>
                            <input type="text" id="input-type" class="form-input" readonly>
                        </div>
                        <div class="form-group">
                            <label class="form-label">用户ID</label>
                            <input type="text" id="input-id" class="form-input" readonly>
                        </div>
                    </div>
                    <button onclick="updateProfile()" class="btn-submit">保存修改</button>
                </div>
            </div>

            <!-- 修改密码卡片 -->
            <div id="section-settings" class="card" style="display: none;">
                <div class="card-header">
                    <h2 class="card-title">修改密码</h2>
                    <p class="card-subtitle">请确保新密码安全且不易被猜测</p>
                </div>
                <div class="card-content password-form">
                    <div class="form-group">
                        <label class="form-label">原密码</label>
                        <div class="input-group">
                            <input type="password" id="input-old-password" class="form-input" placeholder="请输入原密码">
                            <button type="button" class="input-icon-btn" onclick="togglePassword('input-old-password', this)">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">新密码</label>
                        <div class="input-group">
                            <input type="password" id="input-new-password" class="form-input" placeholder="请输入新密码（至少8位，包含字母和数字）" onkeyup="checkPasswordStrength()">
                            <button type="button" class="input-icon-btn" onclick="togglePassword('input-new-password', this)">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                        <div id="password-strength" class="password-strength">
                            <div class="strength-label">密码强度：</div>
                            <div class="strength-bars">
                                <div class="bar" id="bar1"></div>
                                <div class="bar" id="bar2"></div>
                                <div class="bar" id="bar3"></div>
                                <div class="bar" id="bar4"></div>
                            </div>
                            <div id="strength-text" class="strength-text"></div>
                        </div>
                        <div class="password-requirements">
                            <div id="req-length" class="req-item">
                                <span class="req-icon">✓</span>
                                <span>至少8个字符</span>
                            </div>
                            <div id="req-letter" class="req-item">
                                <span class="req-icon">✓</span>
                                <span>包含字母</span>
                            </div>
                            <div id="req-number" class="req-item">
                                <span class="req-icon">✓</span>
                                <span>包含数字</span>
                            </div>
                            <div id="req-special" class="req-item">
                                <span class="req-icon">✓</span>
                                <span>包含特殊字符（可选）</span>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">确认新密码</label>
                        <div class="input-group">
                            <input type="password" id="input-confirm-password" class="form-input" placeholder="请再次输入新密码" onkeyup="checkPasswordMatch()">
                            <button type="button" class="input-icon-btn" onclick="togglePassword('input-confirm-password', this)">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                        <div id="password-match" class="match-indicator"></div>
                    </div>
                    <button onclick="updatePassword()" class="btn-submit" id="btn-submit-password">修改密码</button>
                </div>
            </div>
        </main>
    </div>

    <!-- 引入 Axios -->
    <script src="https://cdn.bootcdn.net/ajax/libs/axios/1.6.2/axios.min.js"></script>
    <script>
        // 配置 Axios 发送 Cookie
        axios.defaults.withCredentials = true;
        
        // 配置 Axios 拦截器，自动添加 JWT Token
        function setupAxiosInterceptors() {
            // 请求拦截器：自动添加Token
            axios.interceptors.request.use(
                config => {
                    const token = localStorage.getItem('token');
                    if (token) {
                        config.headers['Authorization'] = 'Bearer ' + token;
                    }
                    return config;
                },
                error => {
                    return Promise.reject(error);
                }
            );
            
            // 响应拦截器：处理401未授权
            axios.interceptors.response.use(
                response => response,
                error => {
                    if (error.response && error.response.status === 401) {
                        localStorage.removeItem('token');
                        localStorage.removeItem('currentUser');
                        window.location.href = '/index.html';
                    }
                    return Promise.reject(error);
                }
            );
        }
        
        // 页面加载时获取用户信息
        document.addEventListener('DOMContentLoaded', function() {
            setupAxiosInterceptors();
            fetchProfile();
        });

        // 获取个人信息
        function fetchProfile() {
            axios.get('/api/user/profile')
                .then(response => {
                    if (response.data.code === 200) {
                        const data = response.data.data;
                        document.getElementById('header-username').textContent = data.username;
                        document.getElementById('profile-name').textContent = data.username;
                        document.getElementById('profile-role-badge').textContent = data.typeName;
                        document.getElementById('input-username').value = data.username;
                        document.getElementById('input-email').value = data.email || '';
                        document.getElementById('input-type').value = data.typeName;
                        document.getElementById('input-id').value = data.id || '';
                        
                        // 更新统计信息（如果有）
                        if (data.courseCount !== undefined) {
                            document.getElementById('stat-course-count').textContent = data.courseCount;
                        }
                        if (data.studentCount !== undefined) {
                            document.getElementById('stat-student-count').textContent = data.studentCount;
                        }
                    } else {
                        alert('请先登录');
                        window.location.href = '/index.html';
                    }
                })
                .catch(error => {
                    console.error('获取个人信息失败:', error);
                    alert('请先登录');
                    window.location.href = '/index.html';
                });
        }

        // 显示指定区域
        function showSection(sectionName) {
            // 更新侧边栏菜单状态
            document.getElementById('menu-profile').classList.remove('active');
            document.getElementById('menu-settings').classList.remove('active');
            document.getElementById('menu-' + sectionName).classList.add('active');
            
            // 显示/隐藏对应区域
            document.getElementById('section-profile').style.display = sectionName === 'profile' ? 'block' : 'none';
            document.getElementById('section-settings').style.display = sectionName === 'settings' ? 'block' : 'none';
        }

        // 更新个人信息
        function updateProfile() {
            const username = document.getElementById('input-username').value;
            const email = document.getElementById('input-email').value;
            
            if (!username.trim()) {
                alert('请输入用户名');
                return;
            }
            
            axios.put('/api/user/profile', { username, email })
                .then(response => {
                    if (response.data.code === 200) {
                        alert('更新成功');
                        document.getElementById('header-username').textContent = username;
                        document.getElementById('profile-name').textContent = username;
                    } else {
                        alert(response.data.message);
                    }
                })
                .catch(error => {
                    console.error('更新失败:', error);
                    alert('更新失败，请稍后重试');
                });
        }

        // 切换密码可见性
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const svg = button.querySelector('svg');
            if (input.type === 'password') {
                input.type = 'text';
                svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-5.95 5.06M15 11a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"></path>';
            } else {
                input.type = 'password';
                svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }

        // 检查密码强度
        function checkPasswordStrength() {
            const password = document.getElementById('input-new-password').value;
            let strength = 0;
            
            const lengthOk = password.length >= 8;
            document.getElementById('req-length').classList.toggle('fulfilled', lengthOk);
            
            const letterOk = /[a-zA-Z]/.test(password);
            document.getElementById('req-letter').classList.toggle('fulfilled', letterOk);
            
            const numberOk = /[0-9]/.test(password);
            document.getElementById('req-number').classList.toggle('fulfilled', numberOk);
            
            const specialOk = /[!@#$%^&*()_+\-=\[\]{}|;:,.<>?]/.test(password);
            document.getElementById('req-special').classList.toggle('fulfilled', specialOk);
            
            if (lengthOk) strength++;
            if (letterOk && numberOk) strength++;
            if (specialOk) strength++;
            if (password.length >= 12) strength++;
            
            const bars = ['bar1', 'bar2', 'bar3', 'bar4'];
            const textEl = document.getElementById('strength-text');
            
            for (let i = 0; i < bars.length; i++) {
                const bar = document.getElementById(bars[i]);
                bar.className = 'bar';
                if (i < strength) {
                    if (strength === 1) bar.classList.add('weak');
                    else if (strength === 2) bar.classList.add('fair');
                    else if (strength === 3) bar.classList.add('good');
                    else bar.classList.add('strong');
                }
            }
            
            textEl.className = 'strength-text';
            if (strength === 0) {
                textEl.textContent = '';
            } else if (strength === 1) {
                textEl.textContent = '弱 - 请使用更复杂的密码';
                textEl.classList.add('weak');
            } else if (strength === 2) {
                textEl.textContent = '一般 - 建议添加数字或特殊字符';
                textEl.classList.add('fair');
            } else if (strength === 3) {
                textEl.textContent = '良好 - 密码强度不错';
                textEl.classList.add('good');
            } else {
                textEl.textContent = '强 - 密码非常安全';
                textEl.classList.add('strong');
            }
            
            updateSubmitButton();
        }

        // 检查密码匹配
        function checkPasswordMatch() {
            const newPassword = document.getElementById('input-new-password').value;
            const confirmPassword = document.getElementById('input-confirm-password').value;
            const matchEl = document.getElementById('password-match');
            
            if (!confirmPassword) {
                matchEl.textContent = '';
                matchEl.className = 'match-indicator';
            } else if (newPassword === confirmPassword) {
                matchEl.textContent = '✓ 密码匹配';
                matchEl.className = 'match-indicator match';
            } else {
                matchEl.textContent = '✗ 两次输入的密码不一致';
                matchEl.className = 'match-indicator no-match';
            }
            
            updateSubmitButton();
        }

        // 更新提交按钮状态
        function updateSubmitButton() {
            const oldPassword = document.getElementById('input-old-password').value;
            const newPassword = document.getElementById('input-new-password').value;
            const confirmPassword = document.getElementById('input-confirm-password').value;
            const submitBtn = document.getElementById('btn-submit-password');
            
            const hasOldPassword = oldPassword.length > 0;
            const hasNewPassword = newPassword.length >= 8;
            const hasLetter = /[a-zA-Z]/.test(newPassword);
            const hasNumber = /[0-9]/.test(newPassword);
            const passwordsMatch = newPassword === confirmPassword;
            
            if (hasOldPassword && hasNewPassword && hasLetter && hasNumber && passwordsMatch) {
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
                submitBtn.style.cursor = 'pointer';
            } else {
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.6';
                submitBtn.style.cursor = 'not-allowed';
            }
        }

        // 修改密码
        function updatePassword() {
            const oldPassword = document.getElementById('input-old-password').value;
            const newPassword = document.getElementById('input-new-password').value;
            const confirmPassword = document.getElementById('input-confirm-password').value;
            
            if (!oldPassword) {
                alert('请输入原密码');
                return;
            }
            
            if (newPassword.length < 8) {
                alert('新密码至少需要8个字符');
                return;
            }
            
            if (!/[a-zA-Z]/.test(newPassword)) {
                alert('新密码需要包含字母');
                return;
            }
            
            if (!/[0-9]/.test(newPassword)) {
                alert('新密码需要包含数字');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                alert('两次输入的新密码不一致');
                return;
            }
            
            const submitBtn = document.getElementById('btn-submit-password');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = '修改中...';
            submitBtn.disabled = true;
            
            axios.put('/api/user/password', { oldPassword, newPassword })
                .then(response => {
                    if (response.data.code === 200) {
                        alert('密码修改成功，请重新登录');
                        logout();
                    } else {
                        alert(response.data.message);
                    }
                })
                .catch(error => {
                    console.error('修改密码失败:', error);
                    alert('修改密码失败，请稍后重试');
                })
                .finally(() => {
                    submitBtn.textContent = originalText;
                    submitBtn.disabled = false;
                });
        }

        // 返回首页
        function goBack() {
            window.location.href = '/page/home.html';
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = '/index.html';
        }
    </script>
</body>
</html>
