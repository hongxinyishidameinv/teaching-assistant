spring.application.name=mvc-pro

# 服务器端口配置
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/javaweb?useSSL=false&serverTimezone=UTC&useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.type=com.zaxxer.hikari.HikariDataSource

# MyBatis配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.xujc.mvcpro.pojo
mybatis.configuration.map-underscore-to-camel-case=true

# 日志配置
logging.level.com.xujc.mvcpro=DEBUG
logging.level.org.mybatis=DEBUG

# 智谱AI配置
zhipuai.api.key=513f02b0a75d447c9d1ef3e0cfc5821d.lrtJEUvIIa5A4Ckv
zhipuai.api.url=https://open.bigmodel.cn/api/paas/v4/chat/completions
# 使用glm-4-flash模型，速度快很多（推荐）
zhipuai.api.model=glm-4-flash

# 文件上传配置
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
